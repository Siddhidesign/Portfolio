<svg width="1260" height="540" viewBox="0 0 1260 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1260" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b151f"/>
      <stop offset="1" stop-color="#101e2b"/>
    </linearGradient>
    <linearGradient id="boltg" x1="330" y1="190" x2="330" y2="334" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#7df5cd"/>
      <stop offset="0.55" stop-color="#00d4a0"/>
      <stop offset="1" stop-color="#00b389"/>
    </linearGradient>
    <radialGradient id="glowc" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#00d4a0" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00d4a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1260" height="540" fill="url(#bg)"/>

  <!-- faint map grid -->
  <g stroke="#ffffff" stroke-opacity="0.03" stroke-width="1">
    <path d="M105 0V540M210 0V540M315 0V540M420 0V540M525 0V540M630 0V540M735 0V540M840 0V540M945 0V540M1050 0V540M1155 0V540"/>
    <path d="M0 90H1260M0 180H1260M0 270H1260M0 360H1260M0 450H1260"/>
  </g>
  <path d="M0 372H1260" stroke="#ffffff" stroke-opacity="0.05" stroke-width="8"/>

  <!-- ===== left: charge ring ===== -->
  <circle cx="330" cy="262" r="216" fill="url(#glowc)"/>
  <g transform="rotate(-90 330 262)">
    <circle cx="330" cy="262" r="130" stroke="#ffffff" stroke-opacity="0.08" stroke-width="18"/>
    <circle cx="330" cy="262" r="130" stroke="#00d4a0" stroke-width="18" stroke-linecap="round"
            stroke-dasharray="637 817" filter="url(#soft)" opacity="0.5"/>
    <circle cx="330" cy="262" r="130" stroke="#00d4a0" stroke-width="13" stroke-linecap="round"
