  </g>
  <circle cx="330" cy="262" r="104" fill="#0d1d24" opacity="0.7"/>
  <!-- bolt -->
  <path d="M337 192 L267 276 L323 276 L309 332 L393 248 L337 248 Z" fill="#00d4a0" filter="url(#soft)" opacity="0.5"/>
  <path d="M337 192 L267 276 L323 276 L309 332 L393 248 L337 248 Z" fill="url(#boltg)"
        stroke="url(#boltg)" stroke-width="10" stroke-linejoin="round"/>
  <!-- ring chip -->
  <rect x="218" y="432" width="224" height="38" rx="19" fill="#172230"/>
  <circle cx="244" cy="451" r="6" fill="#00d4a0"/>
  <text x="258" y="457" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" letter-spacing="2" fill="#9fe5c8">78% · 22 MIN TO 80%</text>

  <!-- ===== right: station card ===== -->
  <rect x="700" y="118" width="430" height="128" rx="22" fill="#172230"/>
  <rect x="700" y="118" width="430" height="128" rx="22" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1.5"/>
  <rect x="728" y="146" width="58" height="58" rx="14" fill="#00d4a0" opacity="0.16"/>
  <path d="M761 158 L743 181 L755 181 L751 194 L770 170 L758 170 Z" fill="#00d4a0"/>
  <text x="806" y="172" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="16" letter-spacing="1.5" fill="#ffffff">AUTEL CHARGING · 0.5 KM</text>
  <text x="806" y="200" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="13" letter-spacing="1.5" fill="#8899aa">$0.50/KWH · DC FAST</text>
  <rect x="1024" y="212" width="82" height="30" rx="15" fill="#22c55e" opacity="0.16"/>
  <text x="1065" y="232" text-anchor="middle" font-family="'SF Mono','Menlo',monospace" font-size="13" letter-spacing="1.5" fill="#22c55e">3 FREE</text>

  <!-- one-tap row -->
  <rect x="700" y="272" width="430" height="64" rx="18" fill="#ffffff" opacity="0.04"/>
  <circle cx="734" cy="304" r="7" fill="#00d4a0"/>
  <text x="756" y="310" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" letter-spacing="2" fill="#c4d2dd">ONE TAP START · NO RFID CARDS</text>

  <!-- route -->
  <path d="M716 430 C 830 430 850 392 925 392 S 1040 430 1124 430"
