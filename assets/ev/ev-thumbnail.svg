  <circle cx="716" cy="430" r="8" fill="#ffffff"/>
  <circle cx="925" cy="392" r="11" fill="#0b151f" stroke="#00d4a0" stroke-width="3"/>
  <path d="M927 384l-6 9h4l-2.5 8 7-10h-4.5l2-7z" fill="#00d4a0"/>
  <circle cx="1124" cy="430" r="18" fill="#00d4a0" opacity="0.18"/>
  <circle cx="1124" cy="430" r="9" fill="#00d4a0"/>
  <circle cx="1124" cy="430" r="3.5" fill="#0b151f"/>

  <!-- captions -->
  <text x="64" y="64" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" letter-spacing="4" fill="#ffffff" fill-opacity="0.38">EV CHARGING · HUMAN FACTORS</text>
  <text x="630" y="504" text-anchor="middle" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="17" letter-spacing="5.5" fill="#9fe5c8">ONE APP FOR EVERY CHARGER</text>
  <text x="1196" y="64" text-anchor="end" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" letter-spacing="2" fill="#00d4a0">4 APPS → 1</text>
