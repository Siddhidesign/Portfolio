<svg width="1260" height="540" viewBox="0 0 1260 540" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ibg" x1="0" y1="0" x2="1260" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#e7edf6"/>
      <stop offset="1" stop-color="#d2dcea"/>
    </linearGradient>
    <filter id="isoft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
