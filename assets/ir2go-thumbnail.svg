    <text x="212" y="186" font-family="'SF Mono','Menlo',monospace" font-size="15" letter-spacing="1" fill="#334155">RETURN RECEIVED</text>
    <!-- step 2 done -->
    <circle cx="176" cy="272" r="16" fill="#2e9e63"/>
    <path d="M168 272l5.5 5.5L184 266" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="212" y="278" font-family="'SF Mono','Menlo',monospace" font-size="15" letter-spacing="1" fill="#334155">REFUND APPROVED</text>
    <!-- step 3 active -->
    <circle cx="176" cy="364" r="22" fill="#f4604c" opacity="0.18"/>
    <circle cx="176" cy="364" r="16" fill="#f4604c"/>
    <circle cx="176" cy="364" r="6" fill="#ffffff"/>
    <text x="212" y="370" font-family="'SF Mono','Menlo',monospace" font-size="15" letter-spacing="1" fill="#f4604c">REFUND SENT · 2 DAYS</text>
  </g>

