  <circle cx="762" cy="144" r="7" fill="#7be0a8"/>
  <text x="780" y="150" font-family="'SF Mono','Menlo',monospace" font-size="14" letter-spacing="1.5" fill="#e8eef7">WCAG 2.1 AA</text>

  <!-- captions -->
  <text x="64" y="64" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" letter-spacing="4" fill="#5a6b85" fill-opacity="0.75">IRS2GO REDESIGN · GOVTECH</text>
  <text x="630" y="500" text-anchor="middle" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="17" letter-spacing="5.5" fill="#46556c">GOV UX, ACCESSIBLE BY DEFAULT</text>
  <text x="1196" y="500" text-anchor="end" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" letter-spacing="2" fill="#f4604c">2.8★ APP → SUS ×2.5</text>
