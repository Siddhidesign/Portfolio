  <rect x="600" y="306" width="320" height="120" rx="22" fill="#ffffff"/>
  <text x="632" y="346" font-family="'SF Mono','Menlo',monospace" font-size="14" letter-spacing="3" fill="#8b99ad">SUS SCORE</text>
  <text x="632" y="396" font-family="'SF Mono','Menlo',monospace" font-size="34" fill="#334155">31.3</text>
  <path d="M728 384 H788 M788 384 L770 370 M788 384 L770 398" stroke="#f4604c" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="806" y="396" font-family="'SF Mono','Menlo',monospace" font-size="34" fill="#f4604c">78.2</text>

  <!-- accessibility figure -->
  <g stroke="#334155" stroke-width="7" stroke-linecap="round" fill="none">
    <circle cx="668" cy="148" r="40" stroke-opacity="0.9"/>
    <circle cx="668" cy="132" r="7" fill="#334155" stroke="none"/>
    <path d="M648 146 H688 M668 146 V162 M668 162 L656 176 M668 162 L680 176"/>
