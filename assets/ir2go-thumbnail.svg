    <path d="M896 150 H1164"/>
    <path d="M916 182 V330 M982 182 V330 M1048 182 V330 M1114 182 V330 M1144 182 V330"/>
    <path d="M886 182 H1174"/>
    <path d="M868 362 H1192 M880 330 H1180"/>
  </g>

  <!-- refund tracker card -->
  <rect x="128" y="108" width="380" height="330" rx="24" fill="#5a6b85" opacity="0.18" filter="url(#isoft)"/>
  <rect x="118" y="96" width="380" height="330" rx="24" fill="#ffffff"/>
  <text x="152" y="142" font-family="'SF Mono','Menlo','Consolas',monospace" font-size="14" letter-spacing="4" fill="#8b99ad">WHERE'S MY REFUND</text>

  <!-- stepper -->
